name: "Aikido Safe Chain"
description: "Protect your CI/CD pipeline from malicious packages using Aikido Safe Chain."
author: "Your Name"

branding:
  icon: "shield"
  color: "purple"

inputs:
  version:
    description: "Pin a specific safe-chain version (e.g. 1.3.2). Leave empty for latest."
    required: false
    default: ""
  logging:
    description: "Logging level for safe-chain output. Valid values: silent, normal, verbose."
    required: false
    default: ""
  minimum-package-age-hours:
    description: "Minimum age (in hours) a package must exist before it can be installed (npm only). Default is 24."
    required: false
    default: ""
  npm-minimum-package-age-exclusions:
    description: "Comma-separated list of npm packages/scopes excluded from minimum age filtering (e.g. @aikidosec/*)."
    required: false
    default: ""
  npm-custom-registries:
    description: "Comma-separated list of custom npm registries to scan (e.g. npm.company.com,registry.internal.net)."
    required: false
    default: ""
  pip-custom-registries:
    description: "Comma-separated list of custom pip/PyPI registries to scan (e.g. pip.company.com,registry.internal.net)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Aikido Safe Chain
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          INSTALL_URL="https://github.com/AikidoSec/safe-chain/releases/download/${{ inputs.version }}/install-safe-chain.sh"
        else
          INSTALL_URL="https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh"
        fi
        curl -fsSL "$INSTALL_URL" | sh -s -- --ci

    - name: Configure Safe Chain environment
      shell: bash
      run: |
        # Export env vars for subsequent steps in the calling workflow
        if [ -n "${{ inputs.logging }}" ]; then
          echo "SAFE_CHAIN_LOGGING=${{ inputs.logging }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.minimum-package-age-hours }}" ]; then
          echo "SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS=${{ inputs.minimum-package-age-hours }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.npm-minimum-package-age-exclusions }}" ]; then
          echo "SAFE_CHAIN_NPM_MINIMUM_PACKAGE_AGE_EXCLUSIONS=${{ inputs.npm-minimum-package-age-exclusions }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.npm-custom-registries }}" ]; then
          echo "SAFE_CHAIN_NPM_CUSTOM_REGISTRIES=${{ inputs.npm-custom-registries }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ inputs.pip-custom-registries }}" ]; then
          echo "SAFE_CHAIN_PIP_CUSTOM_REGISTRIES=${{ inputs.pip-custom-registries }}" >> "$GITHUB_ENV"
        fi

    - name: Add safe-chain to PATH
      shell: bash
      run: |
        echo "$HOME/.safe-chain/shims" >> "$GITHUB_PATH"
        echo "$HOME/.safe-chain/bin" >> "$GITHUB_PATH"

    - name: Verify safe-chain installation
      shell: bash
      run: safe-chain --version
